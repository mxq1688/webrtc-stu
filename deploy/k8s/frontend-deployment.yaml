apiVersion: apps/v1
kind: Deployment
metadata:
  name: webrtc-frontend
  namespace: xiaozhi
  labels:
    app: webrtc-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webrtc-frontend
  template:
    metadata:
      labels:
        app: webrtc-frontend
    spec:
      imagePullSecrets:
        - name: harbor-registry
      containers:
        - name: frontend
          image: docker.ioam.top/xiaozhi/webrtc-frontend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
